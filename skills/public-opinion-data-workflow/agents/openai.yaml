interface:
  display_name: "舆情数据处理与情感分析"
  short_description: "端到端处理中文舆情表格数据，支持脱敏、清洗、筛选、建标、抽样 AI 标注、分类器迁移和复核。"
  default_prompt: "请使用 $public-opinion-data-workflow 检查这个舆情数据集：先识别字段并做隐私/脱敏处理，再清洗和筛选；情感/态度占比默认保留重复评论作为声量，不要自动去重。如需去重，请另做去重口径并保留 duplicate_count。若是大规模评论情感或态度分析，请先确认或建立标签口径，再抽样 AI 标注、分类迁移、复核并导出质量摘要。"
